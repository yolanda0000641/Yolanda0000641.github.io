<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>食材录入</title>
    <style>
        body{padding:30px; font-family:Microsoft YaHei; background:#f5f7fa;}
        .box{max-width:700px; background:white; padding:25px; border-radius:10px;}
        input,select{padding:10px; width:280px; margin:5px; font-size:14px;}
        button{padding:10px 20px; background:#4299e1; color:white; border:none; border-radius:5px; cursor:pointer;}
    </style>
</head>
<body>

<div class="box">
    <h3>食材选择</h3>
    <!-- 搜索框 -->
    <input type="text" id="search" placeholder="搜索食材">
    <br>
    <!-- 下拉框 -->
    <select id="foodSelect">
        <option value="">请选择食材</option>
    </select>
    <button id="add">添加</button>
</div>

<!-- 🔥 关键：正确引入你的真实数据 -->
<script src="../js/full_data.js"></script>

<script>
// ==========================================
// 真实功能：下拉显示所有食物 + 搜索实时筛选
// 比赛专用，绝对稳定
// ==========================================
window.onload = function() {
    const search = document.getElementById("search");
    const select = document.getElementById("foodSelect");

    // 1. 加载所有食物到下拉框（真实读取你的 full_data.js）
    function loadFoods(data) {
        select.innerHTML = "<option value=''>请选择食材</option>";
        for(let i=0; i<data.length; i++){
            let name = data[i]["食物名称"];
            if(!name) continue;
            let opt = document.createElement("option");
            opt.value = name;
            opt.innerText = name;
            select.appendChild(opt);
        }
    }

    // 2. 初始加载所有食物
    loadFoods(FULL_FOOD_DATA);

    // 3. 搜索实时筛选（真实可用）
    search.oninput = function(){
        let key = this.value.toLowerCase();
        let result = FULL_FOOD_DATA.filter(item => 
            item["食物名称"]?.toLowerCase().includes(key)
        );
        loadFoods(result);
    };

    // 4. 添加按钮
    document.getElementById("add").onclick = function(){
        let val = select.value;
        if(!val){
            alert("请选择食材");
            return;
        }
        alert("已添加：" + val);
    };
};
</script>

</body>
</html>
