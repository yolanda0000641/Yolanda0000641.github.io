<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>营养分析报告</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/echarts.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 详细营养分析 -->
    <div class="card">
      <h2>详细营养分析</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- 宏量营养素 -->
        <div>
          <h3>宏量营养素</h3>
          <div id="macroChart" style="width:100%;height:300px;"></div>
        </div>
        <!-- 微量元素 -->
        <div>
          <h3>微量元素</h3>
          <div style="margin-top:20px;">
            <div style="margin-bottom:15px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span>钠 (mg)</span>
                <span>276 / 2000</span>
              </div>
              <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
                <div style="height:100%;width:13.8%;background:#f6ad55;border-radius:5px;"></div>
              </div>
            </div>
            <div style="margin-bottom:15px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span>钙 (mg)</span>
                <span>181 / 800</span>
              </div>
              <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
                <div style="height:100%;width:22.6%;background:#4299e1;border-radius:5px;"></div>
              </div>
            </div>
            <div style="margin-bottom:15px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span>铁 (mg)</span>
                <span>11 / 15</span>
              </div>
              <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
                <div style="height:100%;width:73.3%;background:#48bb78;border-radius:5px;"></div>
              </div>
            </div>
            <div style="margin-bottom:15px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span>维生素C (mg)</span>
                <span>62 / 100</span>
              </div>
              <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
                <div style="height:100%;width:62%;background:#f56565;border-radius:5px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 个性化膳食建议 -->
    <div class="card">
      <h2>个性化膳食建议</h2>
      <div style="margin-top:20px;">
        <div style="background:#f0fff4;padding:16px;border-radius:8px;margin-bottom:15px;">
          <h3 style="color:#22543d;margin-bottom:8px;">🍏 增加蔬果摄入</h3>
          <p style="color:#22543d;">建议每日摄入500g以上的蔬菜水果，以提供足够的维生素、矿物质和膳食纤维</p>
        </div>
        <div style="background:#ebf8ff;padding:16px;border-radius:8px;">
          <h3 style="color:#2a4365;margin-bottom:8px;">💧 保持充足水分</h3>
          <p style="color:#2a4365;">建议每日饮水1500-2000ml，保持身体水分平衡</p>
        </div>
      </div>
    </div>

    <!-- 返回按钮 -->
    <div style="text-align:center;margin-top:30px;">
      <a href="02-input.html" class="btn btn-blue" style="text-decoration:none;">返回食材录入</a>
      <a href="01-index.html" class="btn btn-red" style="text-decoration:none;margin-left:20px;">返回首页</a>
    </div>
  </div>

  <script>
    // 宏量营养素图表初始化
    window.onload = () => {
      const chartDom = document.getElementById("macroChart");
      if (chartDom && echarts) {
        const myChart = echarts.init(chartDom);
        const option = {
          tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
          xAxis: { type: "category", data: ["蛋白质(g)", "脂肪(g)", "碳水化合物(g)"] },
          yAxis: { type: "value", max: 350 },
          series: [
            {
              name: "实际摄入",
              type: "bar",
              data: [43, 46, 1376/4],
              itemStyle: { color: "#4299e1" }
            },
            {
              name: "推荐摄入",
              type: "bar",
              data: [60, 65, 300],
              itemStyle: { color: "#a0aec0" }
            }
          ]
        };
        myChart.setOption(option);
      }
    };
  </script>
</body>
</html>
