<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>食材录入</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 个人信息卡片 -->
    <div class="card">
      <h2>个人信息</h2>
      <div class="form-group">
        <label>年龄</label>
        <select>
          <option>成人（18-59岁）</option>
          <option>60岁以上</option>
        </select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select>
          <option>男</option>
          <option>女</option>
        </select>
      </div>
      <div class="form-group">
        <label>身高 (cm)</label>
        <input type="text" value="170">
      </div>
      <div class="form-group">
        <label>体重 (kg)</label>
        <input type="text" value="65">
      </div>
      <div class="form-group">
        <label>活动水平</label>
        <select>
          <option>中度活动</option>
          <option>轻度活动</option>
          <option>重度活动</option>
        </select>
      </div>
    </div>

    <!-- 添加食材卡片 -->
    <div class="card">
      <h2>添加食材</h2>
      <div class="form-group">
        <label>食材名称</label>
        <div style="display:flex;gap:15px;align-items:center;">
          <input type="text" id="searchInput" placeholder="例如：大米" style="flex:1;">
          <select id="foodSelect" style="flex:1;">
            <option value="">请选择食材</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>重量 (克)</label>
        <input type="text" id="foodWeight" value="100" placeholder="例如：100">
      </div>
      <div class="form-group">
        <label>餐次</label>
        <select id="mealSelect">
          <option>早餐</option>
          <option>午餐</option>
          <option>晚餐</option>
          <option>加餐</option>
        </select>
      </div>
      <button class="btn btn-blue" id="addFoodBtn" style="width:100%;padding:15px;font-size:18px;">+ 添加食材</button>
    </div>

    <!-- 今日食谱卡片 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2>今日食谱</h2>
        <button class="btn btn-red" id="clearBtn">清空</button>
      </div>

      <!-- 早餐 -->
      <div style="margin-bottom:20px;border-left:4px solid #4299e1;padding-left:16px;">
        <h3>早餐</h3>
        <div id="breakfastList"></div>
      </div>
      <!-- 午餐 -->
      <div style="margin-bottom:20px;border-left:4px solid #48bb78;padding-left:16px;">
        <h3>午餐</h3>
        <div id="lunchList"></div>
      </div>
      <!-- 晚餐 -->
      <div style="margin-bottom:20px;border-left:4px solid #f6ad55;padding-left:16px;">
        <h3>晚餐</h3>
        <div id="dinnerList"></div>
      </div>
      <!-- 加餐 -->
      <div style="border-left:4px solid #ed8936;padding-left:16px;">
        <h3>加餐</h3>
        <div id="snackList"></div>
      </div>
    </div>

    <!-- 按钮 -->
    <div style="display:flex;justify-content:space-between;margin-top:30px;">
      <a href="01-index.html" class="btn btn-blue" style="text-decoration:none;">返回首页</a>
      <a href="03-result.html" class="btn btn-red" style="text-decoration:none;">生成营养分析报告</a>
    </div>
  </div>

  <!-- 🔥 正确引用路径：js/ -->
  <script src="js/full_data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
