<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>全国膳食地图</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 必须先引入ECharts核心库 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    #mapChart { width: 90%; height: 70vh; margin: 20px auto; border: 1px solid #eee; }
    .back-btn { position: fixed; bottom: 30px; left: 30px; padding: 12px 24px; background: #3498db; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align: center; margin: 20px 0;">全国各省膳食营养分布（官方监测数据）</h1>
    <!-- 地图容器必须有明确宽高 -->
    <div id="mapChart"></div>
    <button class="back-btn" onclick="location.href='01-index.html'">返回首页</button>
  </div>

  <script src="js/full_data.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 页面加载后强制初始化地图
    window.onload = function() {
      // 等待DOM和ECharts加载完成
      setTimeout(() => {
        initMap();
      }, 500);
    };
  </script>
</body>
</html>
