<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>营养健康管理系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/echarts.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
      <h1>营养健康管理系统</h1>
       <a href="index.html" class="btn btn-blue">个人设置</a>
    </div>

    <!-- 数据概览卡片 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;">
      <!-- 膳食平衡指数 -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h3>膳食平衡指数</h3>
          <span style="background:#ebf8ff;color:#4299e1;padding:8px;border-radius:50%;">⚖️</span>
        </div>
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:48px;font-weight:bold;color:#4299e1;">40</div>
          <div style="font-size:20px;color:#718096;">优秀</div>
        </div>
        <div>
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span>谷薯类</span>
              <span>90%</span>
            </div>
            <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
              <div style="height:100%;width:90%;background:#4299e1;border-radius:5px;"></div>
            </div>
          </div>
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span>蔬菜水果</span>
              <span>75%</span>
            </div>
            <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
              <div style="height:100%;width:75%;background:#48bb78;border-radius:5px;"></div>
            </div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span>蛋白质</span>
              <span>85%</span>
            </div>
            <div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;">
              <div style="height:100%;width:85%;background:#f6ad55;border-radius:5px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 营养摄入概览 -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h3>营养摄入概览</h3>
          <span style="background:#f0fff4;color:#48bb78;padding:8px;border-radius:50%;">🍽️</span>
        </div>
        <div id="nutritionChart" style="width:100%;height:200px;"></div>
        <div style="display:flex;justify-content:space-around;margin-top:20px;">
          <div>
            <div style="font-size:24px;font-weight:bold;color:#4299e1;">1376</div>
            <div style="color:#718096;">kcal</div>
          </div>
          <div>
            <div style="font-size:24px;font-weight:bold;color:#48bb78;">43</div>
            <div style="color:#718096;">g</div>
          </div>
          <div>
            <div style="font-size:24px;font-weight:bold;color:#f6ad55;">46</div>
            <div style="color:#718096;">g</div>
          </div>
        </div>
      </div>

      <!-- 健康风险评估 -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h3>健康风险评估</h3>
          <span style="background:#fff5f5;color:#e53e3e;padding:8px;border-radius:50%;">❤️</span>
        </div>
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:16px;color:#48bb78;margin-bottom:10px;">● 当前无明显健康风险</div>
          <button class="btn btn-blue">查看详细评估</button>
        </div>
      </div>
    </div>

    <!-- 个人信息卡片 -->
    <div class="card">
      <h3>个人信息</h3>
      <div class="form-group">
        <label>年龄</label>
        <select>
          <option>成人（18-59岁）</option>
          <option>60岁以上</option>
        </select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select>
          <option>男</option>
          <option>女</option>
        </select>
      </div>
      <div class="form-group">
        <label>身高 (cm)</label>
        <input type="text" value="170">
      </div>
      <div class="form-group">
        <label>体重 (kg)</label>
        <input type="text" value="65">
      </div>
      <div class="form-group">
        <label>活动水平</label>
        <select>
          <option>中度活动</option>
          <option>轻度活动</option>
          <option>重度活动</option>
        </select>
      </div>
    </div>

    <!-- 入口按钮 -->
    <div style="text-align:center;margin-top:30px;">
      <button onclick="location.href='input.html'" class="btn btn-blue" style="text-decoration:none;">录入食材</button>
      <button onclick="location.href='result.html'" class="btn btn-red" style="text-decoration:none;margin-left:20px;">查看营养报告</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // 首页图表初始化
    window.onload = () => {
      const chartDom = document.getElementById("nutritionChart");
      if (chartDom && echarts) {
        const myChart = echarts.init(chartDom);
        const option = {
          series: [
            { type: "pie", radius: ["40%", "70%"], data: [
              { value: 43, name: "蛋白质", itemStyle: { color: "#4299e1" } },
              { value: 46, name: "脂肪", itemStyle: { color: "#f6ad55" } },
              { value: 1376/4, name: "碳水化合物", itemStyle: { color: "#48bb78" } }
            ] }
          ]
        };
        myChart.setOption(option);
      }
    };
  </script>
</body>
</html>
